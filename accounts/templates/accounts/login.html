{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="auth-backdrop">
  <div class="auth-modal">
    <button class="close-btn" onclick="window.location.href='/'">&times;</button>
    <h2 class="auth-heading">Login</h2>
    <p class="auth-subtext">Welcome back. Enter your credentials to continue.</p>

    <form method="POST">
      {% csrf_token %}
      <label>Username:</label>
      <input type="text" name="username" required><br><br>

      <label>Password:</label>
      <input type="password" name="password" required><br><br>

      <button type="submit" class="auth-submit-btn">Login</button>
    </form>

    <p class="auth-footer">Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
  </div>
</div>
{% endblock %}
